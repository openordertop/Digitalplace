<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Digitalplace</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header class="header" id="main-header">
            <div class="header-container">
                <div class="logo">Digitalplace</div>
                <nav class="nav">
                    <!--<a href="#inicio">Inicio</a>
                    <a href="#caracteristicas">Características</a>-->
                    <a href="#contacto">Contacto</a>
                </nav>
            </div>
        </header>

        <main class="hero-banner" id="inicio">
            <div class="banner-content">
                <h1 class="hero-title">¡Prepárate para la Aventura!</h1>
                <p class="hero-subtitle">
                    Descarga la última versión de DigiAdventures ya mismo.
                </p>
                <a
                    href="https://drive.google.com/file/d/1L75NFkSDNA8XhSSZ7q-9lOgPZn5dAYF3/view?usp=sharing"
                    class="btn-download"
                    >DESCARGAR AHORA</a
                >
            </div>
        </main>

        <footer class="footer" id="contacto">
            <div class="footer-container">
                <div class="footer-info">
                    <h3>Contacto</h3>
                    <p>Email: anderon2201.me@gmail.com</p>
                </div>
                <div class="footer-copyright">
                    <p>
                        &copy; 2026 AnderonGames. Todos los derechos reservados.
                    </p>
                </div>
            </div>
        </footer>

        <script>
            let lastScrollTop = 0;
            const header = document.getElementById("main-header");

            window.addEventListener("scroll", function () {
                let scrollTop =
                    window.pageYOffset || document.documentElement.scrollTop;

                if (scrollTop > lastScrollTop) {
                    // Al hacer scroll hacia ABAJO, ocultamos el header
                    header.style.top = "-80px";
                } else {
                    // Al hacer scroll hacia ARRIBA, mostramos el header
                    header.style.top = "0";
                }
                lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // Evita valores negativos
            });
        </script>
    </body>
</html>
